services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: hottakeranker
      POSTGRES_USER: hottakeranker
      POSTGRES_PASSWORD: hottakeranker
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hottakeranker"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/hottakeranker
      DB_USERNAME: hottakeranker
      DB_PASSWORD: hottakeranker
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: docker-dev-jwt-secret-change-in-prod
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ../hottakeranker-frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
